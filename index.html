  <script>
    function toggleMenu() {
      document.getElementById('siteNav').classList.toggle('open');
    }

    // カウントダウンタイマー（次の月曜0時 JST まで）
    function updateCountdown() {
      var now = new Date();
      var jst = new Date(now.getTime() + (9 * 60 * 60 * 1000));
      var day = jst.getUTCDay();
      var daysUntil = day === 0 ? 1 : (8 - day);
      if (day === 1 && jst.getUTCHours() === 0 && jst.getUTCMinutes() === 0) daysUntil = 7;
      var next = new Date(jst);
      next.setUTCDate(jst.getUTCDate() + daysUntil);
      next.setUTCHours(0, 0, 0, 0);
      var diff = next - jst;
      if (diff <= 0) return;
      var d = Math.floor(diff / 86400000);
      var h = Math.floor((diff % 86400000) / 3600000);
      var m = Math.floor((diff % 3600000) / 60000);
      var txt = d + '日 ' + h + '時間 ' + m + '分';
      document.querySelectorAll('.countdown-timer').forEach(function(el) {
        el.textContent = txt;
      });
    }
    updateCountdown();
    setInterval(updateCountdown, 60000);

    // ランキングタブ切替
    document.querySelectorAll('.ranking-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.ranking-tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        document.querySelectorAll('.ranking-list').forEach(function(l) { l.style.display = 'none'; });
        var target = document.getElementById(tab.getAttribute('data-target'));
        if (target) target.style.display = 'block';
      });
    });
  </script>
