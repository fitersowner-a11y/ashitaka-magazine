name: Auto-post from wakust

on:
  schedule:
    # 毎週 月曜・水曜・金曜 の日本時間 朝 7:00 (UTC 22:00 前日)
    - cron: '0 22 * * 0,2,4'
  workflow_dispatch:
    inputs:
      max_posts:
        description: '最大投稿数'
        required: false
        default: '3'
      dry_run:
        description: 'Dry run (書き込まず確認のみ)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  auto-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --break-system-packages playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run auto-post script
        run: |
          python3 auto_post.py \
            --max ${{ github.event.inputs.max_posts || '3' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Fetch bestseller articles
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python3 fetch_bestsellers.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json data/bestseller_articles.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "auto-post: $(date +'%Y-%m-%d') の記事を追加"
            git push
          fi
