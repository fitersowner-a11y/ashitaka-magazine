name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 毎日 UTC 22:00 (JST 07:00) に自動ビルド
    # auto_post.py で articles.json が更新された後に実行される想定
    - cron: '0 22 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build site
        env:
          # SEO関連のシークレット（GitHub Secretsで管理）
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          GSC_VERIFICATION: ${{ secrets.GSC_VERIFICATION }}
        run: |
          python3 build.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
